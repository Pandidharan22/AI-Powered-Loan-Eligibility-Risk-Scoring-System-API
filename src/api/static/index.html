<!DOCTYPE html>
<html>
<head>
    <title>Loan Risk Predictor</title>
    <style>
        body {
            font-family: Arial;
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }
        input, select {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }
        button {
            padding: 10px;
            width: 100%;
            background: black;
            color: white;
            border: none;
        }
        #result {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<h2>Loan Risk Prediction</h2>

<input id="Age" placeholder="Age">
<input id="Income" placeholder="Income">
<input id="LoanAmount" placeholder="Loan Amount">
<input id="CreditScore" placeholder="Credit Score">
<input id="MonthsEmployed" placeholder="Months Employed">
<input id="NumCreditLines" placeholder="Num Credit Lines">
<input id="InterestRate" placeholder="Interest Rate">
<input id="LoanTerm" placeholder="Loan Term">
<input id="DTIRatio" placeholder="DTI Ratio">

<select id="Education">
    <option>Bachelor's</option>
    <option>Master's</option>
    <option>PhD</option>
    <option>High School</option>
</select>

<select id="EmploymentType">
    <option>Full-time</option>
    <option>Part-time</option>
    <option>Self-employed</option>
    <option>Unemployed</option>
</select>

<select id="MaritalStatus">
    <option>Single</option>
    <option>Married</option>
    <option>Divorced</option>
</select>

<select id="HasMortgage">
    <option>Yes</option>
    <option>No</option>
</select>

<select id="HasDependents">
    <option>Yes</option>
    <option>No</option>
</select>

<select id="LoanPurpose">
    <option>Home</option>
    <option>Auto</option>
    <option>Education</option>
    <option>Business</option>
    <option>Other</option>
</select>

<select id="HasCoSigner">
    <option>Yes</option>
    <option>No</option>
</select>

<button onclick="predict()">Predict</button>

<div id="result"></div>

<script>
async function predict() {
    const data = {
        Age: parseInt(document.getElementById("Age").value),
        Income: parseInt(document.getElementById("Income").value),
        LoanAmount: parseInt(document.getElementById("LoanAmount").value),
        CreditScore: parseInt(document.getElementById("CreditScore").value),
        MonthsEmployed: parseInt(document.getElementById("MonthsEmployed").value),
        NumCreditLines: parseInt(document.getElementById("NumCreditLines").value),
        InterestRate: parseFloat(document.getElementById("InterestRate").value),
        LoanTerm: parseInt(document.getElementById("LoanTerm").value),
        DTIRatio: parseFloat(document.getElementById("DTIRatio").value),
        Education: document.getElementById("Education").value,
        EmploymentType: document.getElementById("EmploymentType").value,
        MaritalStatus: document.getElementById("MaritalStatus").value,
        HasMortgage: document.getElementById("HasMortgage").value,
        HasDependents: document.getElementById("HasDependents").value,
        LoanPurpose: document.getElementById("LoanPurpose").value,
        HasCoSigner: document.getElementById("HasCoSigner").value
    };

    const response = await fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerText =
        `Probability: ${result.default_probability.toFixed(2)} | Prediction: ${result.prediction}`;
}
</script>

</body>
</html>
