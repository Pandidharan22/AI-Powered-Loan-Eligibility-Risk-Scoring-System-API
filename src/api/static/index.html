<!DOCTYPE html>
<html>
<head>
    <title>Loan Risk Predictor</title>
    <style>
        body {
            font-family: Arial;
            max-width: 700px;
            margin: auto;
            padding: 20px;
        }
        h2 {
            text-align: center;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 10px;
        }
        input, select {
            width: 100%;
            margin-top: 5px;
            padding: 8px;
        }
        button {
            margin-top: 20px;
            padding: 12px;
            width: 100%;
            background: black;
            color: white;
            border: none;
            font-size: 16px;
        }
        #result {
            margin-top: 20px;
            padding: 15px;
            background: #f2f2f2;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>Loan Default Risk Predictor</h2>

<label>Age (years)</label>
<input id="Age" placeholder="e.g., 35">

<label>Annual Income</label>
<input id="Income" placeholder="e.g., 50000">

<label>Loan Amount</label>
<input id="LoanAmount" placeholder="e.g., 150000">

<label>Credit Score (300–850)</label>
<input id="CreditScore" placeholder="e.g., 650">

<label>Months Employed</label>
<input id="MonthsEmployed" placeholder="e.g., 24">

<label>Number of Credit Lines</label>
<input id="NumCreditLines" placeholder="e.g., 2">

<label>Interest Rate (%)</label>
<input id="InterestRate" placeholder="e.g., 12.5">

<label>Loan Term (months)</label>
<input id="LoanTerm" placeholder="e.g., 36">

<label>Debt-to-Income Ratio (0–1)</label>
<input id="DTIRatio" placeholder="e.g., 0.4">

<label>Education Level</label>
<select id="Education">
    <option>Bachelor's</option>
    <option>Master's</option>
    <option>PhD</option>
    <option>High School</option>
</select>

<label>Employment Type</label>
<select id="EmploymentType">
    <option>Full-time</option>
    <option>Part-time</option>
    <option>Self-employed</option>
    <option>Unemployed</option>
</select>

<label>Marital Status</label>
<select id="MaritalStatus">
    <option>Single</option>
    <option>Married</option>
    <option>Divorced</option>
</select>

<label>Has Mortgage?</label>
<select id="HasMortgage">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Has Dependents?</label>
<select id="HasDependents">
    <option>Yes</option>
    <option>No</option>
</select>

<label>Loan Purpose</label>
<select id="LoanPurpose">
    <option>Home</option>
    <option>Auto</option>
    <option>Education</option>
    <option>Business</option>
    <option>Other</option>
</select>

<label>Has Co-Signer?</label>
<select id="HasCoSigner">
    <option>Yes</option>
    <option>No</option>
</select>

<button onclick="predict()">Predict Risk</button>

<div id="result"></div>

<script>
async function predict() {
    const data = {
        Age: parseInt(document.getElementById("Age").value),
        Income: parseInt(document.getElementById("Income").value),
        LoanAmount: parseInt(document.getElementById("LoanAmount").value),
        CreditScore: parseInt(document.getElementById("CreditScore").value),
        MonthsEmployed: parseInt(document.getElementById("MonthsEmployed").value),
        NumCreditLines: parseInt(document.getElementById("NumCreditLines").value),
        InterestRate: parseFloat(document.getElementById("InterestRate").value),
        LoanTerm: parseInt(document.getElementById("LoanTerm").value),
        DTIRatio: parseFloat(document.getElementById("DTIRatio").value),
        Education: document.getElementById("Education").value,
        EmploymentType: document.getElementById("EmploymentType").value,
        MaritalStatus: document.getElementById("MaritalStatus").value,
        HasMortgage: document.getElementById("HasMortgage").value,
        HasDependents: document.getElementById("HasDependents").value,
        LoanPurpose: document.getElementById("LoanPurpose").value,
        HasCoSigner: document.getElementById("HasCoSigner").value
    };

    const response = await fetch("/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(data)
    });

    const result = await response.json();

    const label = result.prediction === 1 ? "YES (High Risk)" : "NO (Low Risk)";

    document.getElementById("result").innerHTML = `
        <strong>Default Probability:</strong> ${(result.default_probability * 100).toFixed(2)}%<br>
        <strong>Likely to Default:</strong> ${label}
    `;
}
</script>

</body>
</html>
